version: '3.8'

services:
  # 1. Container da Aplicação (Laravel + PHP-FPM)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: acai_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - db

  # 2. Container do Servidor Web (Nginx)
  web:
    image: nginx:alpine
    container_name: acai_web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  # 3. Container do Banco de Dados (MySQL 8)
  db:
    image: mysql:8.0
    container_name: acai_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-acai_express}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-acai_user}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: